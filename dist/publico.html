<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Icono y Favicon de la Web -->
  <link rel="icon" type="image/png" href="assets/icon.png">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="assets/icon.png">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil Público — CineVerse</title>
  <meta name="description" content="Mira las películas favoritas, historial y reseñas de este usuario en CineVerse.">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Hojas de Estilo -->
  <link rel="stylesheet" href="css/variables.css?v=3.0.0">
  <link rel="stylesheet" href="css/reset.css?v=3.0.0">
  <link rel="stylesheet" href="css/layout.css?v=3.0.0">
  <link rel="stylesheet" href="css/components.css?v=3.0.0">
  <link rel="stylesheet" href="css/navbar.css?v=3.0.0">
  <link rel="stylesheet" href="css/animations.css?v=3.0.0">
  <link rel="stylesheet" href="css/responsive.css?v=3.0.0">

  <style>
    body {
      background-color: var(--bg-void);
      padding-top: 100px;
    }

    .public-banner {
      height: 220px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-subtle);
      position: relative;
      overflow: hidden;
      margin-bottom: -50px;
      box-shadow: var(--shadow-card);
    }

    .public-hero {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 0 1.5rem;
      margin-bottom: 3rem;
    }

    .public-avatar-wrap {
      position: relative;
      margin-bottom: 1rem;
    }

    .public-avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--bg-void);
      background-color: var(--bg-primary);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .public-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background: linear-gradient(135deg, #F5C518, #b38f00);
      color: #000;
      font-size: 0.72rem;
      font-weight: 800;
      padding: 0.25rem 0.65rem;
      border-radius: var(--radius-full);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 0.5rem;
      box-shadow: 0 4px 12px rgba(245,197,24,0.3);
    }

    .public-stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      max-width: 500px;
      width: 100%;
      margin: 2rem 0;
    }

    .public-stat-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 1rem;
      text-align: center;
      transition: border-color 0.2s;
    }

    .public-stat-card:hover {
      border-color: var(--accent-red);
    }

    .public-stat-num {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .public-stat-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      margin-top: 0.2rem;
    }

    .public-section {
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: var(--shadow-card);
    }

    .public-section-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
  </style>
</head>
<body>

  <!-- Transición de página -->
  <div class="page-transition-overlay out"></div>

  <main class="container" style="max-width: 850px; padding-bottom: 5rem;">

    <!-- Cargando State -->
    <div id="public-loader" style="text-align: center; padding: 6rem 0;">
      <div style="font-size: 3rem; margin-bottom: 1rem; animation: pulse 1.5s infinite;">🎬</div>
      <h3 style="font-size: 1.25rem; color: var(--text-secondary);">Buscando perfil...</h3>
    </div>

    <!-- Error State -->
    <div id="public-error" style="display: none; text-align: center; padding: 6rem 0;">
      <div style="font-size: 4rem; margin-bottom: 1rem;">🔍❌</div>
      <h3 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem;">Usuario no encontrado</h3>
      <p style="color: var(--text-muted); margin-bottom: 2rem;">El enlace de perfil público puede ser incorrecto o el usuario no existe.</p>
      <a href="index.html" class="btn btn--primary">Volver al Inicio</a>
    </div>

    <!-- Perfil Contenido -->
    <div id="public-profile-content" style="display: none;">
      
      <!-- Banner de Portada -->
      <div class="public-banner" id="public-banner"></div>

      <!-- Héroe del Perfil -->
      <div class="public-hero">
        <div class="public-avatar-wrap">
          <img src="" alt="" class="public-avatar" id="public-avatar">
        </div>
        <h1 style="font-size: 2.25rem; font-weight: 800; color: #fff;" id="public-name">Cargando...</h1>
        <p style="color: var(--text-secondary); margin-top: 0.25rem; font-family: var(--font-mono); font-size: 0.88rem;" id="public-username">@username</p>
        
        <span class="public-badge" id="public-premium-badge" style="display: none;">👑 Mecenas VIP</span>
        
        <p style="color: var(--text-secondary); max-width: 500px; margin-top: 1rem; font-size: 0.95rem; line-height: 1.5;" id="public-bio"></p>

        <!-- Estadísticas -->
        <div class="public-stats-grid">
          <div class="public-stat-card">
            <div class="public-stat-num" id="stat-vistos">0</div>
            <div class="public-stat-label">Vistos</div>
          </div>
          <div class="public-stat-card">
            <div class="public-stat-num" id="stat-favs">0</div>
            <div class="public-stat-label">Favoritos</div>
          </div>
          <div class="public-stat-card">
            <div class="public-stat-num" id="stat-reviews">0</div>
            <div class="public-stat-label">Reseñas</div>
          </div>
        </div>

        <button class="btn btn--primary" id="btn-share-profile" style="display: flex; align-items: center; gap: 0.5rem;">
          🔗 Compartir Perfil
        </button>
      </div>

      <!-- Reseña Anclada -->
      <div class="public-section" id="public-section-pinned" style="display: none;">
        <h3 class="public-section-title">📌 Crítica Destacada</h3>
        <div id="pinned-review-container"></div>
      </div>

      <!-- Favoritos Recientes -->
      <div class="public-section">
        <h3 class="public-section-title">❤️ Favoritos</h3>
        <div class="grid grid--3" id="public-favorites-grid"></div>
      </div>

      <!-- Historial de Visualización -->
      <div class="public-section">
        <h3 class="public-section-title">👁️ Visto Recientemente</h3>
        <div class="grid grid--3" id="public-history-grid"></div>
      </div>

    </div>

  </main>

  <script type="module" src="js/pages/publico.js?v=3.0.0"></script>
  <script type="module" src="js/ads-helper.js?v=3.0.0"></script>
</body>
</html>
