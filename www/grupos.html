<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Icono y Favicon de la Web -->
  <link rel="icon" type="image/png" href="assets/icon.png">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="assets/icon.png">

  <meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#e50914">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CineVerse">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grupos Privados — CineVerse</title>
  <meta name="description" content="Crea grupos privados con tus amigos, chatea en tiempo real y comparte tus películas y series favoritas en CineVerse.">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Hojas de Estilo -->
  <link rel="stylesheet" href="css/variables.css?v=3.0.0">
  <link rel="stylesheet" href="css/reset.css?v=3.0.0">
  <link rel="stylesheet" href="css/layout.css?v=3.0.0">
  <link rel="stylesheet" href="css/components.css?v=3.0.0">
  <link rel="stylesheet" href="css/navbar.css?v=3.0.0">
  <link rel="stylesheet" href="css/animations.css?v=3.0.0">
  <link rel="stylesheet" href="css/forms.css?v=3.0.0">
  <link rel="stylesheet" href="css/responsive.css?v=3.0.0">

  <style>
    body {
      background-color: var(--bg-void);
      padding-top: 80px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-sizing: border-box;
    }

    .groups-layout {
      display: grid;
      grid-template-columns: 280px 1fr 240px;
      flex: 1;
      height: calc(100vh - 80px);
      background: var(--bg-primary);
      border-top: 1px solid var(--border-subtle);
    }

    /* Sidebar Izquierdo: Lista de Grupos */
    .groups-sidebar {
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .groups-sidebar__header {
      padding: 1.25rem 1rem;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .groups-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .group-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      border: 1px solid transparent;
      text-align: left;
      background: none;
      width: 100%;
    }

    .group-item:hover {
      background: rgba(255,255,255,0.02);
    }

    .group-item.active {
      background: rgba(229,9,20,0.06);
      border-color: rgba(229,9,20,0.25);
    }

    .group-item__avatar {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-md);
      background: linear-gradient(135deg, var(--accent-red), #8B0000);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #fff;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .group-item__info {
      flex: 1;
      min-width: 0;
    }

    .group-item__name {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Area Central: Chat */
    .chat-area {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
      background: var(--bg-primary);
      position: relative;
    }

    .chat-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border-subtle);
      background: var(--bg-secondary);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .message-bubble {
      display: flex;
      gap: 0.75rem;
      max-width: 75%;
      align-self: flex-start;
    }

    .message-bubble--own {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .message-content {
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      padding: 0.75rem 1rem;
      border-radius: 0 12px 12px 12px;
      font-size: 0.9rem;
      line-height: 1.4;
      color: var(--text-primary);
      position: relative;
    }

    .message-bubble--own .message-content {
      background: var(--accent-red);
      border-color: var(--accent-red);
      border-radius: 12px 0 12px 12px;
      color: #fff;
    }

    .message-author {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-secondary);
      margin-bottom: 0.25rem;
      display: block;
    }

    .message-bubble--own .message-author {
      color: rgba(255,255,255,0.8);
      text-align: right;
    }

    .message-time {
      font-size: 0.65rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
      display: block;
      text-align: right;
    }

    .message-bubble--own .message-time {
      color: rgba(255,255,255,0.6);
    }

    .chat-input-container {
      padding: 1rem 1.5rem;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-subtle);
    }

    .chat-form {
      display: flex;
      gap: 0.75rem;
    }

    /* Sidebar Derecho: Miembros y Opciones */
    .group-details-sidebar {
      background: var(--bg-secondary);
      border-left: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 1.25rem 1rem;
      gap: 1.5rem;
    }

    .members-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      overflow-y: auto;
      flex: 1;
    }

    .member-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .member-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
    }

    .member-name {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Modal de Crear Grupo */
    .cv-modal-content {
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 2rem;
      max-width: 400px;
      width: 90%;
      position: relative;
    }

    /* Vista de bienvenida vacía */
    .empty-chat-welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
    }

    /* Responsive */
    @media (max-width: 900px) {
      .groups-layout {
        grid-template-columns: 80px 1fr 0px;
      }
      .group-item__info, .groups-sidebar__header span, .group-details-sidebar, #sidebar-btn-invite {
        display: none !important;
      }
      .group-item {
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <!-- Transición de página -->
  <div class="page-transition-overlay out"></div>

  <!-- Layout Principal de Grupos -->
  <div class="groups-layout">
    
    <!-- Sidebar Izquierdo: Lista de Grupos -->
    <aside class="groups-sidebar">
      <div class="groups-sidebar__header">
        <span style="font-weight: 800; font-size: 1rem; color: #fff;">👥 Mis Grupos</span>
        <button class="btn btn--primary" id="btn-open-create-group" style="padding: 0.4rem 0.75rem; font-size: 0.8rem; font-weight: 700;">+ Nuevo</button>
      </div>
      <div class="groups-list" id="groups-list-container">
        <!-- Loader / Grupos inyectados por JS -->
      </div>
    </aside>

    <!-- Area Central: Chat -->
    <main class="chat-area">
      <!-- Mensaje de bienvenida -->
      <div class="empty-chat-welcome" id="chat-welcome-screen">
        <span style="font-size: 4rem; margin-bottom: 1rem; animation: float 4s ease-in-out infinite;">👥</span>
        <h3 style="font-size: 1.35rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem;">Grupos Privados</h3>
        <p style="font-size: 0.9rem; max-width: 320px; line-height: 1.5;">Selecciona un grupo del menú lateral o crea uno nuevo para empezar a compartir.</p>
      </div>

      <!-- Contenedor del Chat (oculto por defecto) -->
      <div id="chat-container" style="display: none; flex-direction: column; flex: 1; overflow: hidden; height: 100%;">
        <div class="chat-header">
          <div>
            <h3 style="font-size: 1.1rem; font-weight: 800; color: #fff;" id="active-group-title">Grupo</h3>
            <span style="font-size: 0.75rem; color: var(--text-secondary);" id="active-group-member-count">0 miembros</span>
          </div>
        </div>

        <div class="chat-messages" id="chat-messages-container">
          <!-- Mensajes cargados aquí -->
        </div>

        <div class="chat-input-container">
          <form class="chat-form" id="chat-send-form">
            <input type="text" id="chat-message-input" placeholder="Escribe un mensaje al grupo..." maxlength="150" required
              style="flex: 1; background: var(--bg-void); border: 1px solid var(--border-subtle); border-radius: var(--radius-sm); padding: 0.75rem 1rem; color: #fff; font-family: var(--font-ui); font-size: 0.9rem; outline: none;">
            <button type="submit" class="btn btn--primary" style="padding: 0.75rem 1.5rem; font-weight: 700;">Enviar</button>
          </form>
        </div>
      </div>
    </main>

    <!-- Sidebar Derecho: Miembros e Invitaciones -->
    <aside class="group-details-sidebar" id="group-details-sidebar" style="display: none;">
      <div>
        <h4 style="font-size: 0.8rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.5px; margin-bottom: 0.75rem;">👥 Miembros</h4>
        <div class="members-list" id="group-members-container">
          <!-- Miembros cargados por JS -->
        </div>
      </div>

      <div style="border-top: 1px solid var(--border-subtle); padding-top: 1rem;">
        <h4 style="font-size: 0.8rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.5px; margin-bottom: 0.75rem;">➕ Invitar Amigo</h4>
        <form id="group-invite-form" style="display: flex; flex-direction: column; gap: 0.5rem;">
          <input type="text" id="invite-username" placeholder="Usuario (ej: lorenzo)" required
            style="width: 100%; background: var(--bg-void); border: 1px solid var(--border-subtle); border-radius: var(--radius-sm); padding: 0.5rem 0.75rem; color: #fff; font-size: 0.8rem; font-family: var(--font-ui); outline: none; box-sizing: border-box;">
          <button type="submit" class="btn btn--primary" id="sidebar-btn-invite" style="width: 100%; padding: 0.5rem; font-size: 0.8rem; font-weight: 700;">Invitar</button>
        </form>
      </div>
    </aside>

  </div>

  <!-- Modal para Crear Grupo -->
  <div id="create-group-modal" style="display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); align-items: center; justify-content: center;">
    <div class="cv-modal-content">
      <h3 style="font-size: 1.25rem; font-weight: 800; color: #fff; margin-bottom: 0.5rem; text-align: center;">👥 Crear Nuevo Grupo</h3>
      <p style="color: var(--text-secondary); font-size: 0.85rem; text-align: center; margin-bottom: 1.5rem;">Crea un espacio exclusivo para compartir con tus amigos.</p>
      
      <form id="create-group-form" style="display: flex; flex-direction: column; gap: 1rem;">
        <div class="form-group" style="margin: 0;">
          <label style="font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); display: block; margin-bottom: 0.4rem;">Nombre del Grupo</label>
          <input type="text" id="new-group-name" placeholder="ej: Los Cinéfilos del Barrio" required maxlength="25"
            style="width: 100%; background: var(--bg-void); border: 1px solid var(--border-subtle); border-radius: var(--radius-sm); padding: 0.7rem 0.9rem; color: #fff; font-family: var(--font-ui); font-size: 0.9rem; outline: none; box-sizing: border-box;">
        </div>

        <div style="display: flex; gap: 0.75rem; margin-top: 0.5rem;">
          <button type="button" id="btn-close-create-group" class="btn btn--secondary" style="flex: 1; padding: 0.6rem;">Cancelar</button>
          <button type="submit" class="btn btn--primary" style="flex: 2; padding: 0.6rem; font-weight: 700;">Crear Grupo</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Scripts -->
  <script type="module" src="js/pages/grupos.js?v=3.0.0"></script>
  <script src="js/pwa-extras.js"></script>
</body>
</html>
