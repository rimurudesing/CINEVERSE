<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Icono y Favicon de la Web -->
  <link rel="icon" type="image/png" href="assets/icon.png">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="assets/icon.png">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineVerse — Iniciar Sesión o Registrarse</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Hojas de Estilo -->
  <link rel="stylesheet" href="css/variables.css?v=3.0.0">
  <link rel="stylesheet" href="css/reset.css?v=3.0.0">
  <link rel="stylesheet" href="css/layout.css?v=3.0.0">
  <link rel="stylesheet" href="css/components.css?v=3.0.0">
  <link rel="stylesheet" href="css/navbar.css?v=3.0.0">
  <link rel="stylesheet" href="css/hero.css?v=3.0.0">
  <link rel="stylesheet" href="css/carousel.css?v=3.0.0">
  <link rel="stylesheet" href="css/modal.css?v=3.0.0">
  <link rel="stylesheet" href="css/skeleton.css?v=3.0.0">
  <link rel="stylesheet" href="css/forms.css?v=3.0.0">
  <link rel="stylesheet" href="css/animations.css?v=3.0.0">
  <link rel="stylesheet" href="css/responsive.css?v=3.0.0">


  <style>
    /* Estilos específicos para la página de login (Fondo completo y panel glass) */
    .login-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--bg-void);
    }
    
    .login-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: blur(4px) brightness(0.4);
      z-index: 1;
      transition: background-image var(--transition-slow);
    }

    .login-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(229, 9, 20, 0.2) 0%, rgba(5, 5, 5, 0.8) 70%);
      z-index: 2;
    }

    .login-card {
      position: relative;
      z-index: 10;
      width: 90%;
      max-width: 450px;
      background-color: rgba(10, 10, 10, 0.85);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 3rem 2.5rem;
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.9), 0 0 30px var(--glow-red);
      font-family: var(--font-ui);
    }

    .auth-tab-btn {
      background: none;
      border: none;
      font-family: var(--font-ui);
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-secondary);
      cursor: pointer;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid transparent;
      transition: var(--transition-fast);
    }

    .auth-tab-btn.active {
      color: var(--text-primary);
      border-bottom-color: var(--accent-red);
    }

    .auth-form {
      display: none;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity var(--transition-med) ease, transform var(--transition-med) ease;
    }

    .auth-form.active {
      display: flex;
      flex-direction: column;
      opacity: 1;
      transform: translateY(0);
    }

    /* ═══ CAMPOS DE ERROR INLINE ═══ */
    .field-error {
      font-family: var(--font-ui);
      font-size: 0.78rem;
      color: #ff4d4d;
      margin-top: 0.35rem;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      min-height: 1.1rem;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.22s ease, transform 0.22s ease;
      pointer-events: none;
    }

    .field-error.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .field-error.field-success {
      color: #22c55e;
    }

    .form-input.input-error {
      border-color: #ff4d4d !important;
      box-shadow: 0 0 0 3px rgba(255, 77, 77, 0.15);
    }

    .form-input.input-success {
      border-color: #22c55e !important;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.12);
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-7px); }
      40%      { transform: translateX(7px); }
      60%      { transform: translateX(-5px); }
      80%      { transform: translateX(5px); }
    }

    .shake { animation: shake 0.4s ease; }

    /* Wrapper para input + icono ojo */
    .input-wrapper {
      position: relative;
    }

    .input-wrapper .form-input {
      padding-right: 2.8rem;
    }

    .toggle-password {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.2rem;
      transition: color 0.2s ease;
      font-size: 1rem;
    }

    .toggle-password:hover { color: var(--text-primary); }

    /* Barra de fortaleza de contraseña */
    .password-strength-bar {
      display: flex;
      gap: 4px;
      margin-top: 0.4rem;
    }

    .strength-segment {
      flex: 1;
      height: 3px;
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.08);
      transition: background 0.3s ease;
    }

    .strength-segment.weak   { background: #ff4d4d; }
    .strength-segment.fair   { background: #facc15; }
    .strength-segment.good   { background: #22c55e; }
    .strength-segment.strong { background: #10b981; }

    .password-strength-label {
      font-family: var(--font-ui);
      font-size: 0.72rem;
      margin-top: 0.25rem;
      min-height: 1rem;
      transition: color 0.3s ease;
    }

    /* Mensaje de éxito global en el formulario */
    .form-alert {
      border-radius: var(--radius-md);
      padding: 0.75rem 1rem;
      font-family: var(--font-ui);
      font-size: 0.84rem;
      line-height: 1.5;
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .form-alert.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .form-alert.alert-error {
      background: rgba(255, 77, 77, 0.08);
      border: 1px solid rgba(255, 77, 77, 0.25);
      color: #ff8080;
    }

    .form-alert.alert-success {
      background: rgba(34, 197, 94, 0.08);
      border: 1px solid rgba(34, 197, 94, 0.25);
      color: #4ade80;
    }

    .form-alert.alert-info {
      background: rgba(59, 130, 246, 0.08);
      border: 1px solid rgba(59, 130, 246, 0.25);
      color: #93c5fd;
    }
  </style>
</head>
<body>

  <!-- Transición de página roja -->
  <div class="page-transition-overlay out"></div>

  <div class="login-container">
    <!-- Fondo de película dinámico -->
    <div class="login-bg" id="login-bg"></div>
    <div class="login-overlay"></div>

    <!-- Panel de login con glassmorphism -->
    <div class="login-card">
      <div style="text-align: center; margin-bottom: 2rem;">
        <h1 style="font-family: var(--font-display); font-size: 3rem; letter-spacing: 2px; line-height: 1; margin-bottom: 0.5rem;">CINE<span style="color: var(--accent-red)">VERSE</span></h1>
        <p style="color: var(--text-secondary); font-size: 0.85rem;">Tu portal definitivo de películas y series</p>
      </div>

      <!-- Tabs de Control -->
      <div class="flex flex--justify-between" style="border-bottom: 1px solid var(--border-subtle); padding-bottom: 0.5rem; margin-bottom: 2rem;">
        <button class="auth-tab-btn active" data-form="login">Entrar</button>
        <button class="auth-tab-btn" data-form="register">Registrarse</button>
        <button class="auth-tab-btn" data-form="recover">Recuperar</button>
      </div>

      <!-- Formulario 1: Login -->
      <form id="form-login" class="auth-form active flex flex--col flex--gap-md">
        <!-- Alerta de error general del formulario -->
        <div id="login-alert" class="form-alert" role="alert" aria-live="polite"></div>

        <div class="form-group">
          <label class="form-label" for="login-email">Correo Electrónico</label>
          <input type="email" id="login-email" class="form-input" placeholder="ejemplo@correo.com"
            autocomplete="email" spellcheck="false" autocapitalize="none" required>
          <div id="login-email-error" class="field-error" role="alert"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="login-password">Contraseña</label>
          <div class="input-wrapper">
            <input type="password" id="login-password" class="form-input" placeholder="••••••••"
              autocomplete="current-password" required>
            <button type="button" class="toggle-password" data-target="login-password" aria-label="Mostrar contraseña" tabindex="-1">
              👁️
            </button>
          </div>
          <div id="login-password-error" class="field-error" role="alert"></div>
          <a href="#" id="login-forgot-link" style="font-size:0.78rem; color:var(--text-muted); margin-top:0.4rem; display:inline-block; transition:color 0.2s;" onmouseover="this.style.color='var(--accent-red)'" onmouseout="this.style.color='var(--text-muted)'">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" id="login-submit-btn" class="btn btn--primary" style="margin-top: 0.5rem;">Iniciar Sesión</button>
      </form>

      <!-- Formulario 2: Registro -->
      <form id="form-register" class="auth-form flex flex--col flex--gap-md">
        <!-- Alerta general de registro -->
        <div id="register-alert" class="form-alert" role="alert" aria-live="polite"></div>

        <div class="form-group">
          <label class="form-label" for="register-username">Nombre de Usuario</label>
          <input type="text" id="register-username" class="form-input" placeholder="tu_usuario"
            autocomplete="username" autocapitalize="none" spellcheck="false" required>
          <div id="register-username-error" class="field-error" role="alert"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="register-email">Correo Electrónico</label>
          <input type="email" id="register-email" class="form-input" placeholder="tu_correo@ejemplo.com"
            autocomplete="email" spellcheck="false" autocapitalize="none" required>
          <div id="register-email-error" class="field-error" role="alert"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="register-password">Contraseña</label>
          <div class="input-wrapper">
            <input type="password" id="register-password" class="form-input" placeholder="Mínimo 6 caracteres"
              autocomplete="new-password" required>
            <button type="button" class="toggle-password" data-target="register-password" aria-label="Mostrar contraseña" tabindex="-1">
              👁️
            </button>
          </div>
          <!-- Barra de fortaleza -->
          <div class="password-strength-bar">
            <div class="strength-segment" id="seg-1"></div>
            <div class="strength-segment" id="seg-2"></div>
            <div class="strength-segment" id="seg-3"></div>
            <div class="strength-segment" id="seg-4"></div>
          </div>
          <div id="password-strength-label" class="password-strength-label" style="color: var(--text-muted);"></div>
          <div id="register-password-error" class="field-error" role="alert"></div>
        </div>

        <button type="submit" id="register-submit-btn" class="btn btn--primary" style="margin-top: 0.5rem;">Crear Cuenta</button>
      </form>

      <!-- Formulario 3: Recuperar Contraseña -->
      <form id="form-recover" class="auth-form flex flex--col flex--gap-md">
        <p style="color: var(--text-secondary); font-size: 0.88rem; line-height: 1.5;">
          Ingresa el correo de tu cuenta y te enviaremos un enlace para restablecer tu contraseña.
        </p>
        <!-- Alerta general de recuperación -->
        <div id="recover-alert" class="form-alert" role="alert" aria-live="polite"></div>

        <div class="form-group">
          <label class="form-label" for="recover-email">Correo Electrónico</label>
          <input type="email" id="recover-email" class="form-input" placeholder="ejemplo@correo.com"
            autocomplete="email" spellcheck="false" autocapitalize="none" required>
          <div id="recover-email-error" class="field-error" role="alert"></div>
        </div>

        <button type="submit" id="recover-submit-btn" class="btn btn--primary" style="margin-top: 0.5rem;">Enviar Enlace</button>
      </form>


    </div>
  </div>

  <script type="module" src="js/pages/login.js?v=3.0.0"></script>
</body>
</html>
