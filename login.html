<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineVerse — Iniciar Sesión o Registrarse</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Hojas de Estilo -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/hero.css">
  <link rel="stylesheet" href="css/carousel.css">
  <link rel="stylesheet" href="css/modal.css">
  <link rel="stylesheet" href="css/skeleton.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">


  <style>
    /* Estilos específicos para la página de login (Fondo completo y panel glass) */
    .login-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--bg-void);
    }
    
    .login-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: blur(4px) brightness(0.4);
      z-index: 1;
      transition: background-image var(--transition-slow);
    }

    .login-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(229, 9, 20, 0.2) 0%, rgba(5, 5, 5, 0.8) 70%);
      z-index: 2;
    }

    .login-card {
      position: relative;
      z-index: 10;
      width: 90%;
      max-width: 450px;
      background-color: rgba(10, 10, 10, 0.85);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 3rem 2.5rem;
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.9), 0 0 30px var(--glow-red);
      font-family: var(--font-ui);
    }

    .auth-tab-btn {
      background: none;
      border: none;
      font-family: var(--font-ui);
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-secondary);
      cursor: pointer;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid transparent;
      transition: var(--transition-fast);
    }

    .auth-tab-btn.active {
      color: var(--text-primary);
      border-bottom-color: var(--accent-red);
    }

    .auth-form {
      display: none;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity var(--transition-med) ease, transform var(--transition-med) ease;
    }

    .auth-form.active {
      display: flex;
      flex-direction: column;
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <!-- Transición de página roja -->
  <div class="page-transition-overlay out"></div>

  <div class="login-container">
    <!-- Fondo de película dinámico -->
    <div class="login-bg" id="login-bg"></div>
    <div class="login-overlay"></div>

    <!-- Panel de login con glassmorphism -->
    <div class="login-card">
      <div style="text-align: center; margin-bottom: 2rem;">
        <h1 style="font-family: var(--font-display); font-size: 3rem; letter-spacing: 2px; line-height: 1; margin-bottom: 0.5rem;">CINE<span style="color: var(--accent-red)">VERSE</span></h1>
        <p style="color: var(--text-secondary); font-size: 0.85rem;">Tu portal definitivo de películas y series</p>
      </div>

      <!-- Tabs de Control -->
      <div class="flex flex--justify-between" style="border-bottom: 1px solid var(--border-subtle); padding-bottom: 0.5rem; margin-bottom: 2rem;">
        <button class="auth-tab-btn active" data-form="login">Entrar</button>
        <button class="auth-tab-btn" data-form="register">Registrarse</button>
        <button class="auth-tab-btn" data-form="recover">Recuperar</button>
      </div>

      <!-- Formulario 1: Login -->
      <form id="form-login" class="auth-form active flex flex--col flex--gap-md">
        <div class="form-group">
          <label class="form-label" for="login-email">Correo Electrónico</label>
          <input type="email" id="login-email" class="form-input" placeholder="ejemplo@correo.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Contraseña</label>
          <input type="password" id="login-password" class="form-input" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn--primary" style="margin-top: 1rem;">Iniciar Sesión</button>
      </form>

      <!-- Formulario 2: Registro -->
      <form id="form-register" class="auth-form flex flex--col flex--gap-md">
        <div class="form-group">
          <label class="form-label" for="register-username">Nombre de Usuario</label>
          <input type="text" id="register-username" class="form-input" placeholder="tu_usuario" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="register-email">Correo Electrónico</label>
          <input type="email" id="register-email" class="form-input" placeholder="tu_correo@ejemplo.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="register-password">Contraseña (Mínimo 6 caract.)</label>
          <input type="password" id="register-password" class="form-input" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn--primary" style="margin-top: 1rem;">Crear Cuenta</button>
      </form>

      <!-- Formulario 3: Recuperar Contraseña -->
      <form id="form-recover" class="auth-form flex flex--col flex--gap-md">
        <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 0.5rem; line-height: 1.4;">Ingresa tu correo electrónico y te enviaremos las instrucciones para restablecer tu contraseña.</p>
        <div class="form-group">
          <label class="form-label" for="recover-email">Correo Electrónico</label>
          <input type="email" id="recover-email" class="form-input" placeholder="ejemplo@correo.com" required>
        </div>
        <button type="submit" class="btn btn--primary" style="margin-top: 1rem;">Enviar Correo</button>
      </form>

      <!-- OAuth Separador -->
      <div style="text-align: center; margin: 2rem 0 1.5rem 0; border-top: 1px solid var(--border-subtle); position: relative; height: 10px;">
        <span style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background-color: rgb(15,15,15); padding: 0 0.75rem; font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700;">o también</span>
      </div>

      <!-- Botón Google -->
      <button class="btn btn--secondary" id="google-auth-btn" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.75rem; font-weight: 700;">
        <svg style="width: 18px; height: 18px;" viewBox="0 0 24 24">
          <path fill="#EA4335" d="M12.24 10.285V14.4h6.887c-.648 2.41-2.519 4.114-5.137 4.114-3.472 0-6.29-2.818-6.29-6.29s2.818-6.29 6.29-6.29c1.635 0 3.116.626 4.237 1.646l3.05-3.05C19.123 2.502 15.86 1 12.24 1 5.922 1 1 5.922 1 12s4.922 11 11.24 11c5.895 0 10.82-4.14 10.82-10.428 0-.672-.06-1.344-.18-1.987H12.24Z"/>
        </svg>
        Entrar con Google
      </button>
    </div>
  </div>

  <script type="module" src="js/pages/login.js"></script>
</body>
</html>
